<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entraînement : Calcul avec des ordres de grandeur</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcfcf4;
            color: #2c3e50;
            max-width: 750px;
            margin: 40px auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            background: white;
        }
        h1 {
            color: #d35400;
            text-align: center;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .step-panel {
            display: none;
        }
        .step-panel.active {
            display: block;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 1.1em;
            border: 2px solid #bdc3c7;
            border-radius: 4px;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        input[type="text"]:focus {
            border-color: #e67e22;
        }
        .consigne {
            font-size: 1.25em;
            font-weight: bold;
            color: #c0392b;
            margin-bottom: 10px;
            background: #fdf2e9;
            padding: 10px;
            border-left: 5px solid #e67e22;
            border-radius: 4px;
        }
        .expression {
            font-size: 2.4em;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 6px;
            margin: 15px 0;
            letter-spacing: 1px;
            color: #2c3e50;
            border: 1px solid #e9ecef;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button.action-btn {
            flex: 1;
            padding: 14px;
            font-size: 1em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-start { background-color: #d35400; color: white; width: 100%; padding: 14px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1em;}
        .btn-start:hover { background-color: #b34500; }
        .btn-submit { background-color: #2ecc71; color: white; }
        .btn-submit:hover { background-color: #27ae60; }
        .btn-skip { background-color: #7f8c8d; color: white; }
        .btn-skip:hover { background-color: #6c7a7d; }
        
        .progress-bar {
            background-color: #e0e0e0;
            border-radius: 4px;
            height: 8px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            background-color: #e67e22;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .indicator {
            text-align: right;
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        .result-box {
            background: #fdfdfd;
            padding: 20px;
            border-radius: 6px;
            border-left: 5px solid #e67e22;
            margin-top: 20px;
            text-align: center;
        }
        .result-box h2 { margin-top: 0; color: #2c3e50; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.95em;
        }
        th, td {
            border: 1px solid #dcdde1;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f5f6fa;
            color: #353b48;
        }
        .row-correct { background-color: #d4edda; color: #155724; }
        .row-incorrect { background-color: #f8d7da; color: #721c24; }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.85em;
        }
        .badge-success { background-color: #2ecc71; color: white; }
        .badge-danger { background-color: #e74c3c; color: white; }
    </style>
</head>
<body>

    <h1>Calcul avec des ordres de grandeur</h1>

    <!-- ÉTAPE 1 : Inscription de l'élève -->
    <div id="panel-login" class="step-panel active">
        <label for="student-name">Entrez votre nom et votre prénom :</label>
        <div style="margin-bottom: 15px;">
            <input type="text" id="student-name" placeholder="Ex: Lucas Simon" style="width: 100%;">
        </div>
        <button class="btn-start" onclick="startTest()">Commencer les exercices</button>
    </div>

    <!-- ÉTAPE 2 : Zone d'exercices -->
    <div id="panel-quiz" class="step-panel">
        <div class="indicator">Question <span id="current-q">1</span> / 5</div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        
        <div class="consigne" id="q-consigne">Consigne cible</div>
        <div class="expression" id="q-expression">Calcul</div>
        
        <input type="text" id="user-answer" placeholder="Ex: 5400" autocomplete="off">
        
        <div class="btn-group">
            <button class="action-btn btn-skip" onclick="skipQuestion()">Passer cette question</button>
            <button class="action-btn btn-submit" onclick="submitAnswer()">Valider ma réponse</button>
        </div>
    </div>

    <!-- ÉTAPE 3 : Fin de séance et Bilan -->
    <div id="panel-results" class="step-panel">
        <div class="result-box">
            <h2>Résultats de l'évaluation</h2>
            <p><strong>Élève :</strong> <span id="res-name">...</span></p>
            <p><strong>Note :</strong> <span id="res-grade" style="font-size: 2.2em; color: #27ae60; font-weight: bold;">0 / 5</span></p>
        </div>

        <h3 style="margin-top:25px; color:#2c3e50; border-bottom:2px solid #bdc3c7; padding-bottom:5px;">Correction détaillée</h3>
        <table>
            <thead>
                <tr>
                    <th>Calcul</th>
                    <th>Cible demandée</th>
                    <th>Calcul attendu</th>
                    <th>Ta réponse</th>
                    <th>Correction</th>
                </tr>
            </thead>
            <tbody id="bilan-table-body">
                <!-- Rempli dynamiquement -->
            </tbody>
        </table>

        <button class="btn-start" style="margin-top: 30px;" onclick="location.reload()">Refaire une série d'exercices</button>
    </div>

    <script>
        let quizQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let studentName = "";

        function formatNumberWithSpaces(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        }

        // Arrondit un nombre à un rang donné (10 = dizaine, 100 = centaine, 1000 = millier)
        function roundToRank(num, rank) {
            return Math.round(num / rank) * rank;
        }

        function buildQuiz() {
            quizQuestions = [];
            
            const scenarios = [
                // Scénario A : Addition - Cible Centaine vs Millier
                () => {
                    const n1 = Math.floor(Math.random() * (4350 - 4120) + 4120);
                    const n2 = Math.floor(Math.random() * (2890 - 2650) + 2650);
                    const targetRank = Math.random() > 0.5 ? 100 : 1000;
                    const rankText = targetRank === 100 ? "à la CENTAINE près" : "au MILLIER près";
                    
                    const r1 = roundToRank(n1, targetRank);
                    const r2 = roundToRank(n2, targetRank);
                    
                    return {
                        expr: `${formatNumberWithSpaces(n1)} + ${formatNumberWithSpaces(n2)}`,
                        consigne: `Trouve l'ordre de grandeur en arrondissant chaque nombre ${rankText} :`,
                        ans: (r1 + r2).toString(),
                        target: rankText,
                        logic: `${formatNumberWithSpaces(r1)} + ${formatNumberWithSpaces(r2)}`
                    };
                },
                // Scénario B : Soustraction - Cible Centaine vs Dizaine
                () => {
                    const n1 = Math.floor(Math.random() * (855 - 815) + 815);
                    const n2 = Math.floor(Math.random() * (345 - 315) + 315);
                    const targetRank = Math.random() > 0.5 ? 100 : 10;
                    const rankText = targetRank === 100 ? "à la CENTAINE près" : "à la DIZAINE près";
                    
                    const r1 = roundToRank(n1, targetRank);
                    const r2 = roundToRank(n2, targetRank);
                    
                    return {
                        expr: `${formatNumberWithSpaces(n1)} - ${formatNumberWithSpaces(n2)}`,
                        consigne: `Trouve l'ordre de grandeur en arrondissant chaque nombre ${rankText} :`,
                        ans: (r1 - r2).toString(),
                        target: rankText,
                        logic: `${formatNumberWithSpaces(r1)} - ${formatNumberWithSpaces(r2)}`
                    };
                },
                // Scénario C : Grands nombres - Cible Millier vs Dizaine de milliers
                () => {
                    const n1 = Math.floor(Math.random() * (34200 - 33800) + 33800);
                    const n2 = Math.floor(Math.random() * (12300 - 11800) + 11800);
                    const targetRank = Math.random() > 0.5 ? 1000 : 10000;
                    const rankText = targetRank === 1000 ? "au MILLIER près" : "à la DIZAINE DE MILLIERS près";
                    
                    const r1 = roundToRank(n1, targetRank);
                    const r2 = roundToRank(n2, targetRank);
                    
                    return {
                        expr: `${formatNumberWithSpaces(n1)} + ${formatNumberWithSpaces(n2)}`,
                        consigne: `Trouve l'ordre de grandeur en arrondissant chaque nombre ${rankText} :`,
                        ans: (r1 + r2).toString(),
                        target: rankText,
                        logic: `${formatNumberWithSpaces(r1)} + ${formatNumberWithSpaces(r2)}`
                    };
                },
                // Scénario D : Multiplication - Cible Dizaine vs Centaine sur le gros facteur
                () => {
                    const n1 = Math.floor(Math.random() * (265 - 235) + 235);
                    const multiplier = [3, 4, 6][Math.floor(Math.random() * 3)];
                    const targetRank = Math.random() > 0.5 ? 100 : 10;
                    const rankText = targetRank === 100 ? "à la CENTAINE près" : "à la DIZAINE près";
                    
                    const r1 = roundToRank(n1, targetRank);
                    
                    return {
                        expr: `${formatNumberWithSpaces(n1)} × ${multiplier}`,
                        consigne: `Trouve l'ordre de grandeur en arrondissant le premier nombre ${rankText} :`,
                        ans: (r1 * multiplier).toString(),
                        target: rankText,
                        logic: `${formatNumberWithSpaces(r1)} × ${multiplier}`
                    };
                },
                // Scénario E : Soustraction grands nombres - Cible Centaine vs Millier
                () => {
                    const n1 = Math.floor(Math.random() * (9350 - 9150) + 9150);
                    const n2 = Math.floor(Math.random() * (4650 - 4450) + 4450);
                    const targetRank = Math.random() > 0.5 ? 100 : 1000;
                    const rankText = targetRank === 100 ? "à la CENTAINE près" : "au MILLIER près";
                    
                    const r1 = roundToRank(n1, targetRank);
                    const r2 = roundToRank(n2, targetRank);
                    
                    return {
                        expr: `${formatNumberWithSpaces(n1)} - ${formatNumberWithSpaces(n2)}`,
                        consigne: `Trouve l'ordre de grandeur en arrondissant chaque nombre ${rankText} :`,
                        ans: (r1 - r2).toString(),
                        target: rankText,
                        logic: `${formatNumberWithSpaces(r1)} - ${formatNumberWithSpaces(r2)}`
                    };
                }
            ];

            const shuffled = scenarios.sort(() => 0.5 - Math.random());
            for (let i = 0; i < 5; i++) {
                const qData = shuffled[i]();
                quizQuestions.push({
                    expr: qData.expr,
                    consigne: qData.consigne,
                    ans: qData.ans,
                    target: qData.target,
                    logic: qData.logic,
                    userAns: null,
                    isCorrect: false
                });
            }
        }

        function startTest() {
            const nameInput = document.getElementById("student-name").value.trim();
            if (nameInput === "") {
                alert("Veuillez entrer votre nom.");
                return;
            }
            studentName = nameInput;
            buildQuiz();
            showPanel("panel-quiz");
            loadQuestion();
        }

        function showPanel(panelId) {
            document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
        }

        function loadQuestion() {
            if (currentIndex >= 5) {
                endTest();
                return;
            }

            const q = quizQuestions[currentIndex];
            document.getElementById("current-q").innerText = currentIndex + 1;
            document.getElementById("q-consigne").innerText = q.consigne;
            document.getElementById("q-expression").innerText = q.expr;
            document.getElementById("user-answer").value = "";
            
            const progress = (currentIndex / 5) * 100;
            document.getElementById("progress-fill").style.width = progress + "%";
            document.getElementById("user-answer").focus();
        }

        function submitAnswer() {
            let userAns = document.getElementById("user-answer").value.replace(/\s+/g, ''); 
            if (userAns === "") {
                alert("Veuillez inscrire une réponse.");
                return;
            }

            const correctAns = quizQuestions[currentIndex].ans;
            quizQuestions[currentIndex].userAns = document.getElementById("user-answer").value.trim();
            
            if (userAns === correctAns) {
                score++;
                quizQuestions[currentIndex].isCorrect = true;
            } else {
                quizQuestions[currentIndex].isCorrect = false;
            }

            currentIndex++;
            loadQuestion();
        }

        function skipQuestion() {
            quizQuestions[currentIndex].userAns = "Passée";
            quizQuestions[currentIndex].isCorrect = false;
            currentIndex++;
            loadQuestion();
        }

        function endTest() {
            showPanel("panel-results");
            document.getElementById("res-name").innerText = studentName;
            document.getElementById("res-grade").innerText = `${score} / 5`;
            
            if (score >= 4) document.getElementById("res-grade").style.color = "#27ae60";
            else if (score >= 2.5) document.getElementById("res-grade").style.color = "#d35400";
            else document.getElementById("res-grade").style.color = "#c0392b";

            const tableBody = document.getElementById("bilan-table-body");
            tableBody.innerHTML = ""; 

            quizQuestions.forEach(q => {
                const row = document.createElement("tr");
                row.className = q.isCorrect ? "row-correct" : "row-incorrect";

                row.innerHTML = `
                    <td>${q.expr}</td>
                    <td><strong style="color:#d35400;">${q.target}</strong></td>
                    <td>${q.logic}</td>
                    <td>${q.userAns}</td>
                    <td>${q.isCorrect ? '<span class="badge badge-success">Juste !</span>' : `<span class="badge badge-danger">Attendu : ${formatNumberWithSpaces(q.ans)}</span>`}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        document.getElementById("user-answer").addEventListener("keyup", function(event) {
            if (event.key === "Enter") submitAnswer();
        });
    </script>
</body>
</html>
